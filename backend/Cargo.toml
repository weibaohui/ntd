[package]
name = "ntd"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = { version = "0.8", features = ["ws", "macros"] }
tokio = { version = "1", features = ["full"] }
rust-embed = "8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
sea-orm = { version = "0.12", features = ["sqlx-sqlite", "runtime-tokio-rustls", "macros", "with-chrono", "with-json"] }
libsqlite3-sys = { version = "0.27", features = ["bundled"] }
clap = { version = "4", features = ["derive"] }
anyhow = "1"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
uuid = { version = "1", features = ["v4"] }
async-trait = "0.1"
regex = "1"
dirs = "5"
tokio-cron-scheduler = "0.13"
cron = "0.15"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-http = { version = "0.6", features = ["trace", "cors", "timeout", "compression-gzip"] }
parking_lot = "0.12"
command-group = { version = "5", features = ["with-tokio"] }
zip = "2"
prost = "0.13"
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }
quick_cache = "0.6"
futures-util = "0.3"
url = "2"
thiserror = "2"
log = "0.4"
dashmap = "6"
which = "7"

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[dev-dependencies]
cargo-watch = "8"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
tempfile = "3"
tower = { version = "0.5", features = ["util"] }

[build-dependencies]
vergen-gitcl = "1"

[profile.release]
lto = true
codegen-units = 1
strip = true
