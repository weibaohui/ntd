# cargo-deny 配置文件。
# 用法：
#   cargo install cargo-deny
#   cargo deny check
# CI 应当把 `cargo deny check` 作为阻断项；本地若新加依赖引发违规，请在此处显式 skip
# 并在 PR 描述里给出理由。

# 1. 漏洞数据库：使用 GitHub Advisory Database 默认镜像。
#    离线环境可改为本地 JSON 文件路径。
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
# 已审计的安全漏洞：无法通过 minor 升级解决，需要 sea-orm 0.12→1.x
# 升级（该变动涉及大量 API 重构，需独立 PR 单独评估）。
#
# - RUSTSEC-2024-0363: sqlx<0.8 二进制协议误解析。本服务仅使用 SQLite 后端，
#   不受二进制协议层面影响（sqlx/sqlite 走 libsqlite3 直接 C API）。
# - RUSTSEC-2026-0098/0099/0104: rustls-webpki v0.101 名称约束/CRL 漏洞。
#   来自 sqlx 0.7→rustls 0.21 链路，sqlx 0.8 升级后将自动消除。
# - RUSTSEC-2023-0071: rsa 0.9 Marvin Attack 时序侧信道。无可用修复；
#   本服务不涉及 RSA 密钥操作，风险不可利用。
ignore = [
    # 安全漏洞 — 需要 sea-orm 0.12→1.x 升级链（参见上方注释）
    "RUSTSEC-2024-0363",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    "RUSTSEC-2023-0071",
    # 已停止维护的 crate — 均为传递依赖，不可直接替换
    "RUSTSEC-2024-0388", # derivative — async-trait 等生态依赖
    "RUSTSEC-2024-0436", # paste — tokio 生态依赖
    "RUSTSEC-2024-0370", # proc-macro-error — clap 传递依赖
    "RUSTSEC-2026-0173", # proc-macro-error2 — 同上
    "RUSTSEC-2025-0134", # rustls-pemfile — sqlx/sea-orm 传递依赖
]

# 2. License 限制：只允许明确列出的 license；其余必须显式 allow。
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "NTP",
]
confidence-threshold = 0.8

# 3. 来源限制：默认从 crates.io 取；可加 Git 源白名单（内部 fork）。
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
# 工作区内部清单：禁止误传某些常用包（容易引入"另一种实现"造成分裂）
skip = []
skip-tree = []

# 4. 来源仓库
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
