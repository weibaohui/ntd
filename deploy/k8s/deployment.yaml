apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntd
  labels:
    app: ntd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntd
  template:
    metadata:
      labels:
        app: ntd
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: ntd
        image: ntd:latest
        ports:
        - containerPort: 8088
        envFrom:
        - configMapRef:
            name: ntd-config
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - name: ntd-data
          mountPath: /home/ntd/.ntd
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: ntd-data
        persistentVolumeClaim:
          claimName: ntd-data-pvc
      - name: tmp
        emptyDir: {}