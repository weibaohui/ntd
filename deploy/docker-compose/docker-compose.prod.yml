services:
  ntd:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: ntd-prod
    ports:
      - "${NTD_PORT:-8088}:8088"
    volumes:
      - ntd-prod-data:/root/.ntd
    environment:
      - NTD_MODE=production
      - RUST_LOG=warn
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  ntd-prod-data:
    driver: local