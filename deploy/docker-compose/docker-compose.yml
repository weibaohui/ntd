services:
  ntd:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: ntd
    ports:
      - "${NTD_PORT:-8088}:8088"
    volumes:
      - ntd-data:/root/.ntd
    environment:
      - NTD_MODE=production
      - RUST_LOG=info
    restart: unless-stopped

volumes:
  ntd-data:
    driver: local